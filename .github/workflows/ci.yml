name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format

      - name: Run tests
        # Tests use @testcontainers/neo4j, so Docker (already available on ubuntu-latest) will be utilized automatically
        run: npm run test

      - name: Check and Build
        run: npm run build
